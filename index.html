<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>像素复古贪吃蛇 (Pixel Snake)</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000;
            --snake-head: #00FF00;
            --snake-body: #00CC00;
            --food-color: #FF00FF;
            --text-color: #00FF00;
            --ui-bg: rgba(0, 255, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            border: 4px solid var(--text-color);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            background: #050505;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        #ui-layer {
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            background: var(--ui-bg);
            border-bottom: 2px solid var(--text-color);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
        }

        .hidden { display: none !important; }

        h1 { font-size: 18px; margin-bottom: 20px; text-shadow: 2px 2px #000; }
        .score-final { font-size: 14px; margin-bottom: 20px; color: #fff; }

        button {
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--text-color);
            padding: 10px 20px;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover, button:active {
            background: var(--text-color);
            color: #000;
        }

        #controls-hint {
            margin-top: 15px;
            font-size: 8px;
            color: #666;
            line-height: 1.5;
        }

        /* 移动端摇杆/按钮区域 */
        #mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            margin-top: 20px;
        }

        .ctrl-btn {
            width: 60px;
            height: 60px;
            background: var(--ui-bg);
            border: 2px solid var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
        }

        .ctrl-up { grid-column: 2; grid-row: 1; }
        .ctrl-left { grid-column: 1; grid-row: 2; }
        .ctrl-right { grid-column: 3; grid-row: 2; }
        .ctrl-down { grid-column: 2; grid-row: 3; }

        @media (min-width: 768px) {
            #mobile-controls { display: none; }
            #ui-layer { font-size: 12px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div>SCORE: <span id="current-score">0000</span></div>
            <div>HI: <span id="high-score">0000</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <!-- 初始屏幕 -->
        <div id="start-screen" class="overlay">
            <h1>PIXEL SNAKE</h1>
            <button id="start-btn">START GAME</button>
            <div id="controls-hint">
                ARROWS / WASD TO MOVE<br>
                SPACE TO PAUSE
            </div>
        </div>

        <!-- 游戏结束 -->
        <div id="game-over-screen" class="overlay hidden">
            <h1 style="color: #FF0000;">GAME OVER</h1>
            <div class="score-final">YOUR SCORE: <span id="final-score">0</span></div>
            <button id="restart-btn">RETRY</button>
        </div>

        <!-- 暂停屏幕 -->
        <div id="pause-screen" class="overlay hidden">
            <h1>PAUSED</h1>
            <button id="resume-btn">RESUME</button>
        </div>
    </div>

    <!-- 移动端按钮 -->
    <div id="mobile-controls">
        <div class="ctrl-btn ctrl-up" data-dir="up">▲</div>
        <div class="ctrl-btn ctrl-left" data-dir="left">◀</div>
        <div class="ctrl-btn ctrl-right" data-dir="right">▶</div>
        <div class="ctrl-btn ctrl-down" data-dir="down">▼</div>
    </div>

    <script src="main.js"></script>
</body>
</html>
